<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Popup</title>
    <style>
      /* full-screen blurred background */
      .bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("photo_2026-03-08_10-53-14.jpg") no-repeat center
          center/cover;
        filter: blur(8px);
        z-index: 0;
      }

      /* overlay behind popup */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
      }

      /* clickable box centered */
      .box {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        width: 220px;
        height: 100px;
        background: pink;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
        text-align: center;
        color: white;
        font-weight: bold;
        font-size: 1.1rem;
      }

      /* popup card */
      .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        width: 300px;
        max-width: 90%;
        background: white;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        z-index: 2;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        transition: transform 0.5s;
      }

      .popup.show {
        transform: translate(-50%, -50%) scale(1);
        animation: heartbeat 1s infinite alternate;
      }

      @keyframes heartbeat {
        0% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) scale(1.05);
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
      }

      .popup img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 15px pink;
        margin-bottom: 10px;
      }

      .popup h2 {
        color: #ff4d6d;
        margin: 5px;
      }

      .popup p {
        font-size: 0.9rem;
        margin-top: 5px;
      }

      .popup button {
        margin-top: 15px;
        padding: 8px 15px;
        border: none;
        background: #ff4d6d;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .heart {
        position: absolute;
        font-size: 16px;
        color: red;
        animation: float 4s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateY(-100px) scale(1.2);
          opacity: 0.8;
        }
        100% {
          transform: translateY(-200px) scale(1);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="overlay" id="overlay"></div>

    <div class="box" id="box">Open Love</div>

    <div class="popup" id="popup">
      <img src="photo_2026-02-15_10-04-15.jpg" alt="Her Photo" />
      <h2>I love you so much!</h2>
      <p id="timer"></p>
      <button id="close">Close</button>
    </div>

    <!-- YouTube music embed -->
    <iframe
      id="ytplayer"
      width="0"
      height="0"
      src="https://www.youtube.com/embed/TTG6nxwdhyA?autoplay=1&loop=1&playlist=TTG6nxwdhyA&controls=0&mute=0"
      frameborder="0"
      allow="autoplay"
    ></iframe>

    <script>
      // elements
      const box = document.getElementById("box");
      const popup = document.getElementById("popup");
      const overlay = document.getElementById("overlay");
      const closeBtn = document.getElementById("close");

      // open popup
      box.addEventListener("click", () => {
        popup.classList.add("show");
        overlay.style.opacity = 1;
        overlay.style.pointerEvents = "auto";
        createFloatingHearts();
      });

      // close popup
      function closePopup() {
        popup.classList.remove("show");
        overlay.style.opacity = 0;
        overlay.style.pointerEvents = "none";
      }
      closeBtn.addEventListener("click", closePopup);
      overlay.addEventListener("click", closePopup);

      // love timer
      const startDate = new Date("2025-11-05");
      function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor(diff / (1000 * 60 * 60)) % 24;
        const m = Math.floor(diff / (1000 * 60)) % 60;
        const s = Math.floor(diff / 1000) % 60;
        document.getElementById("timer").innerHTML = `
    Since Nov 05, 2025 <br>
    ${days} days ${h}h ${m}m ${s}s
  `;
      }
      setInterval(updateTimer, 1000);

      // floating hearts
      function createFloatingHearts() {
        setInterval(() => {
          const heart = document.createElement("div");
          heart.classList.add("heart");
          heart.innerHTML = "❤️";
          heart.style.left = Math.random() * window.innerWidth + "px";
          heart.style.bottom = "0px";
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 4000);
        }, 500);
      }
    </script>
  </body>
</html>
